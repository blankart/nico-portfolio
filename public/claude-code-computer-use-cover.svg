<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1080" y2="550" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="card" x1="160" y1="120" x2="1010" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8FB3CC"/>
      <stop offset="1" stop-color="#5C89A8"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="630" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="40" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="28" fill="url(#bg)"/>
  <circle cx="1030" cy="120" r="170" fill="#8FB3CC" fill-opacity="0.08"/>
  <circle cx="160" cy="570" r="220" fill="#8FB3CC" fill-opacity="0.05"/>

  <g filter="url(#shadow)">
    <rect x="90" y="80" width="1020" height="470" rx="28" fill="url(#card)" stroke="rgba(255,255,255,0.08)"/>
  </g>

  <rect x="140" y="132" width="144" height="36" rx="18" fill="#8FB3CC" fill-opacity="0.14"/>
  <text x="212" y="156" text-anchor="middle" fill="#A9C4D8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">new story</text>

  <text x="140" y="230" fill="#F3F4F6" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="700">
    <tspan x="140" dy="0">How I think Claude Code’s</tspan>
    <tspan x="140" dy="70">computer use feature changes</tspan>
    <tspan x="140" dy="70">the way we work</tspan>
  </text>

  <text x="140" y="468" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500">
    from assistant to operator
  </text>

  <g>
    <rect x="790" y="168" width="240" height="58" rx="18" fill="#0B1220" stroke="#243244"/>
    <circle cx="828" cy="197" r="9" fill="#8FB3CC"/>
    <text x="853" y="205" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">phone prompt</text>

    <path d="M910 233L910 268" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <path d="M910 268L898 256" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <path d="M910 268L922 256" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>

    <rect x="760" y="286" width="300" height="84" rx="24" fill="url(#accent)"/>
    <text x="910" y="322" text-anchor="middle" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Claude Code</text>
    <text x="910" y="350" text-anchor="middle" fill="#183247" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">computer use</text>

    <path d="M910 380L910 416" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <path d="M910 416L898 404" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <path d="M910 416L922 404" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>

    <rect x="790" y="432" width="240" height="58" rx="18" fill="#0B1220" stroke="#243244"/>
    <circle cx="828" cy="461" r="9" fill="#8FB3CC"/>
    <text x="853" y="469" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">desktop actions</text>
  </g>
</svg>
