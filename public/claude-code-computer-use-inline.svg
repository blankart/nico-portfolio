<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="100" y1="80" x2="1100" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="120" x2="1060" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8FB3CC"/>
      <stop offset="1" stop-color="#5C89A8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <rect x="80" y="80" width="1040" height="560" rx="28" fill="#FFFFFF" stroke="#D7DEE7"/>

  <text x="120" y="148" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Old workflow vs agent workflow</text>
  <text x="120" y="184" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500">the difference is not just smarter output — it’s continuity</text>

  <rect x="120" y="240" width="430" height="300" rx="24" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="160" y="294" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Old workflow</text>
  <text x="160" y="338" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">1. ask for code</text>
  <text x="160" y="382" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">2. review answer</text>
  <text x="160" y="426" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">3. switch tools manually</text>
  <text x="160" y="470" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">4. finish the annoying last mile</text>

  <rect x="650" y="240" width="430" height="300" rx="24" fill="#0F172A"/>
  <text x="690" y="294" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Agent workflow</text>
  <text x="690" y="338" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="22">1. give the task once</text>
  <text x="690" y="382" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="22">2. let the tool move across surfaces</text>
  <text x="690" y="426" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="22">3. keep momentum through context switches</text>
  <text x="690" y="470" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="22">4. return when real input is needed</text>

  <path d="M580 390H620" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M620 390L602 372" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M620 390L602 408" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>

  <rect x="120" y="576" width="960" height="28" rx="14" fill="#E2E8F0"/>
  <rect x="120" y="576" width="680" height="28" rx="14" fill="url(#accent)"/>
  <text x="120" y="556" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">continuity across tools and environments</text>
</svg>
